<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <rect width="800" height="500" fill="url(#grid)"/>
  
  <!-- Modern Clean Sidewalk with Greenery -->
  <path d="M 0,350 L 800,350 L 800,500 L 0,500 Z" fill="#047857"/>
  <rect x="0" y="370" width="800" height="130" fill="#10b981" opacity="0.3"/>
  <path d="M 0,370 L 800,370" stroke="#10b981" stroke-width="6"/>

  <!-- Trees & Planters -->
  <circle cx="150" cy="300" r="35" fill="#059669"/>
  <rect x="145" y="330" width="10" height="30" fill="#78350f"/>
  <circle cx="450" cy="290" r="40" fill="#10b981"/>
  <rect x="445" y="325" width="10" height="35" fill="#78350f"/>

  <!-- Palestinian Modern Architectural Buildings -->
  <rect x="80" y="150" width="180" height="200" fill="#1e293b" stroke="#10b981" stroke-width="2" rx="4"/>
  <rect x="300" y="100" width="220" height="250" fill="#0f172a" stroke="#059669" stroke-width="2" rx="4"/>
  <rect x="560" y="180" width="160" height="170" fill="#1e293b" stroke="#10b981" stroke-width="2"/>

  <!-- Solar Street Lights -->
  <line x1="280" y1="260" x2="280" y2="360" stroke="#f59e0b" stroke-width="4"/>
  <circle cx="280" cy="255" r="8" fill="#fbbf24"/>

  <!-- After Badge -->
  <rect x="30" y="30" width="120" height="40" rx="20" fill="#10b981"/>
  <text x="90" y="55" fill="#0f172a" font-family="Tajawal, sans-serif" font-size="18" font-weight="900" text-anchor="middle">بعد - حل تنظيم الذكاء الاصطناعي</text>
</svg>

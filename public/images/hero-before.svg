<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <rect width="800" height="500" fill="url(#grid)"/>
  
  <!-- Damaged Sidewalk Illustration -->
  <path d="M 0,350 L 800,350 L 800,500 L 0,500 Z" fill="#334155"/>
  <path d="M 50,350 L 120,380 L 250,350 L 300,420 L 400,350" fill="none" stroke="#e67e22" stroke-width="4" stroke-dasharray="8,8"/>
  <circle cx="180" cy="390" r="15" fill="#e67e22" opacity="0.3"/>
  <circle cx="450" cy="380" r="25" fill="#e67e22" opacity="0.3"/>
  
  <!-- Buildings -->
  <rect x="80" y="150" width="180" height="200" fill="#475569" rx="4"/>
  <rect x="300" y="100" width="220" height="250" fill="#334155" rx="4"/>
  <rect x="560" y="180" width="160" height="170" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  
  <!-- Obstacles -->
  <rect x="220" y="320" width="40" height="50" fill="#78350f" rx="2"/>
  <rect x="500" y="330" width="60" height="40" fill="#991b1b" rx="2"/>

  <!-- Problem Badge -->
  <rect x="30" y="30" width="120" height="40" rx="20" fill="#e67e22"/>
  <text x="90" y="55" fill="#0f172a" font-family="Tajawal, sans-serif" font-size="18" font-weight="900" text-anchor="middle">قبل - عشوائية</text>
</svg>
